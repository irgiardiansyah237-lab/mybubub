<!DOCTYPE html>
<html>
<head>
    <title>Gallery Foto</title>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        header {
            text-align: center;
            padding: 20px;
            background: #222;
            color: white;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            padding: 15px;
        }

        .gallery img {
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<header>
    <h1>SI CANTIK</h1>
</header>

<div class="gallery">
    <img src="img/foto1.jpg">
    <img src="img/foto2.jpg">
    <img src="img/foto3.jpg">
    <img src="img/foto4.jpg">
    <img src="img/foto5.jpg">
    <img src="img/foto6.jpg">
</div>

</body>
</html>
